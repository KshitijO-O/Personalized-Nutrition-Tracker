<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — NutriTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="toast" class="toast"></div>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <span class="logo-icon-lg">🍎</span>
            <h1>NutriTrack</h1>
        </div>
        <h2>Create your account</h2>
        <p class="auth-subtitle">Start tracking your nutrition today — free</p>
        <form id="registerForm">
            <div class="form-group">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" required placeholder="Your full name" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="regEmail">Email address</label>
                <input type="email" id="regEmail" required placeholder="you@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="regPassword" required placeholder="At least 6 characters" minlength="6" autocomplete="new-password">
                    <span id="togglePassword" class="toggle-eye" title="Toggle visibility">👁</span>
                </div>
            </div>
            <button type="submit" class="btn-primary btn-full">Create Account →</button>
        </form>
        <div class="auth-divider"></div>
        <p class="auth-footer">Already have an account? <a href="/login.html">Sign in</a></p>
    </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
