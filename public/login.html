<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — NutriTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="toast" class="toast"></div>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <span class="logo-icon-lg">🍎</span>
            <h1>NutriTrack</h1>
        </div>
        <h2>Welcome back</h2>
        <p class="auth-subtitle">Sign in to continue tracking</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email address</label>
                <input type="email" id="loginEmail" required placeholder="you@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" required placeholder="Your password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary btn-full">Sign In →</button>
        </form>
        <div class="auth-divider"></div>
        <p class="auth-footer">Don't have an account? <a href="/register.html">Create one free</a></p>
    </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
